<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exams - DeptzCS</title>
    <link rel="icon" href="logo2.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Audiowide', sans-serif;
            background: linear-gradient(135deg, #010a13, #0e0e0e);
            color: #fff;
            height: 100%;
        }
        header {
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            text-align: center;
        }
        .exam-container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        h1, h2 {
            text-align: center;
            color: #00bfff;
        }
        .exam-section {
            margin-bottom: 30px;
        }
        .exam-link {
            display: block;
            padding: 15px;
            margin: 10px 0;
            background: #0056b3;
            border-radius: 10px;
            text-align: center;
            color: white;
            text-decoration: none;
            transition: background 0.3s ease;
        }
        .exam-link:hover {
            background: #007acc;
        }
        .seat-arrangement {
            text-align: center;
            margin: 20px 0;
        }
        .seat-chart {
            border-collapse: collapse;
            margin: 0 auto;
        }
        .seat-chart th, .seat-chart td {
            border: 1px solid #00bfff;
            padding: 10px;
            color: #000;
            background: #fff;
        }
        .seat-chart th {
            background: #00bfff;
            color: #fff;
        }
    </style>
</head>
<body>

<header>
    <h1>Exam Information</h1>
</header>

<div class="exam-container">
    <div class="exam-section">
        <h2>Exam Schedule</h2>
        <a href="exam-schedule.html" class="exam-link">View Exam Schedule</a>
    </div>
</div>
</body>
</html>
